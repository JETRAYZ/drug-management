<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดคลังยา</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0ea5e9', // Sky blue 500
                        'primary-light': '#e0f2fe', // Sky blue 100
                        'primary-dark': '#0369a1', // Sky blue 700
                    },
                    fontFamily: {
                        sans: ['Inter', 'Sarabun', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased h-screen flex overflow-hidden">

    <!-- Sidebar Navigation -->
    <aside class="w-64 bg-white shadow-lg h-full flex flex-col z-20 transition-transform duration-300 transform -translate-x-full md:translate-x-0 absolute md:relative" id="sidebar">
        <div class="p-6 flex items-center justify-between border-b">
            <div class="flex items-center gap-2 text-primary">
                <i data-lucide="pill" class="w-8 h-8"></i>
                <span class="text-xl font-bold tracking-tight">ระบบจัดคลังยา</span>
            </div>
            <button id="closeSidebar" class="md:hidden text-gray-500 hover:text-gray-700">
                <i data-lucide="x"></i>
            </button>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1 px-3" id="navMenu">
                <!-- Links generated by JS -->
            </ul>
        </nav>

        </nav>
    </aside>

    <!-- Main Content Wrapper -->
    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <!-- Header -->
        <header class="bg-white shadow-sm z-10 h-16 flex items-center justify-between px-4 lg:px-8">
            <div class="flex items-center gap-4">
                <button id="openSidebar" class="md:hidden text-gray-500 hover:text-gray-700">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <h1 id="pageTitle" class="text-xl font-semibold text-gray-800">แดชบอร์ด</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="relative" id="notifContainer">
                    <button id="notifBellBtn" onclick="window.toggleNotifications(event)" class="relative p-2 text-gray-400 hover:text-primary transition-colors focus:outline-none">
                        <i data-lucide="bell" class="w-5 h-5"></i>
                        <span id="notifBadge" class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full hidden"></span>
                    </button>
                    <!-- Notification Dropdown -->
                    <div id="notifDropdown" class="hidden absolute right-0 mt-2 w-80 bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden z-50">
                        <div class="p-3 border-b bg-gray-50 flex justify-between items-center" id="notifHeader">
                            <h3 class="font-bold text-gray-800 text-sm">การแจ้งเตือน</h3>
                            <span id="notifCount" class="bg-red-100 text-red-600 text-[10px] px-2 py-0.5 rounded-full font-bold">0</span>
                        </div>
                        <div id="notifList" class="max-h-80 overflow-y-auto divide-y divide-gray-50">
                            <!-- Items go here -->
                        </div>
                    </div>
                </div>
                <div class="relative" id="userMenuContainer">
                    <button onclick="window.toggleUserMenu(event)" class="flex items-center gap-3 focus:outline-none hover:bg-gray-50 rounded-xl px-2 py-1 transition-colors">
                        <img id="userAvatar" src="https://ui-avatars.com/api/?name=Admin+User&background=0ea5e9&color=fff" alt="User" class="w-8 h-8 rounded-full border border-gray-200">
                        <div class="hidden md:block text-sm text-left">
                            <p class="font-medium text-gray-700" id="userDisplayName">Admin User</p>
                            <p class="text-xs text-gray-500" id="userDisplayRole">หัวหน้าคลังยา</p>
                        </div>
                        <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400 hidden md:block"></i>
                    </button>
                    <!-- User Dropdown -->
                    <div id="userMenuDropdown" class="hidden absolute right-0 mt-2 w-52 bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden z-50">
                        <div class="p-3 border-b bg-gray-50">
                            <p class="text-xs font-bold text-gray-800" id="userMenuName">Admin User</p>
                            <p class="text-[11px] text-gray-500" id="userMenuRole">หัวหน้าคลังยา</p>
                        </div>
                        <div class="p-1">
                            <button onclick="window.handleLogout()" class="w-full text-left flex items-center gap-2 px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors font-medium">
                                <i data-lucide="log-out" class="w-4 h-4"></i> ออกจากระบบ
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-4 lg:p-8 relative" id="mainContent">
            <!-- Content will be injected here by JS -->
        </main>
    </div>

    <!-- Modals Container -->
    <div id="modalContainer"></div>

    <!-- Login Screen -->
    <div id="loginScreen" class="fixed inset-0 bg-gray-50 z-[100] flex items-center justify-center flex-col">
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 w-full max-w-md transform transition-all">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-primary-light text-primary rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="pill" class="w-8 h-8"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">ระบบจัดคลังยา</h2>
                <p class="text-gray-500 text-sm mt-1">เข้าสู่ระบบเพื่อจัดการคลังยา</p>
            </div>
            <form onsubmit="window.handleLogin(event)">
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อผู้ใช้งาน (Username)</label>
                        <div class="relative">
                            <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                            <input type="text" id="loginUsername" required class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่าน (Password)</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                            <input type="password" id="loginPassword" required class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Google Sheet API URL (สำหรับเชื่อมฐานข้อมูล)</label>
                        <div class="relative">
                            <i data-lucide="database" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                            <input type="url" id="sheetUrl" placeholder="https://script.google.com/macros/s/.../exec" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all">
                        </div>
                    </div>
                    <p id="loginError" class="text-red-500 text-sm hidden text-center bg-red-50 p-2 rounded-md border border-red-100">ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง</p>
                    <button type="submit" class="w-full bg-primary hover:bg-primary-dark text-white font-medium py-2.5 rounded-lg transition-colors mt-2 shadow-md hover:shadow-lg">
                        เข้าสู่ระบบ
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="app.js?v=5.0"></script>
</body>
</html>
